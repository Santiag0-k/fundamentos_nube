<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso | CEA Instituto de Movilidad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-root">

  <!-- ── Left: brand image ─────────────────────── -->
  <div class="login-brand">
    <img src="img/carousel-bg-1.jpg" alt="CEA Instituto de Movilidad">
    <div class="login-brand-overlay">
      <div class="login-brand-title">CEA Instituto<br>de Movilidad</div>
      <div class="login-brand-sub">Centro de Educación Avanzada</div>
    </div>
  </div>

  <!-- ── Right: login form ─────────────────────── -->
  <div class="login-panel">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">
          <span class="material-symbols-rounded" style="font-size:26px">directions_car</span>
        </div>
        <div class="login-logo-text">
          <h1>CEA</h1>
          <p>Instituto de Movilidad</p>
        </div>
      </div>

      <!-- Headline -->
      <div class="login-headline">Bienvenido</div>
      <div class="login-sub">Accede al panel administrativo</div>

      <!-- Form -->
      <form id="loginForm" autocomplete="off">
        <div class="md-field">
          <input
            class="md-field-input"
            type="text"
            id="username"
            name="username"
            placeholder=" "
            required
            autocomplete="username"
          >
          <label class="md-field-label" for="username">Usuario</label>
        </div>

        <div class="md-field" style="position:relative">
          <input
            class="md-field-input"
            type="password"
            id="password"
            name="password"
            placeholder=" "
            required
            autocomplete="current-password"
          >
          <label class="md-field-label" for="password">Contraseña</label>
          <button type="button" id="togglePwd" style="
            position:absolute; right:12px; top:50%; transform:translateY(-50%);
            background:none; border:none; cursor:pointer; padding:4px;
            color:var(--md-on-surface-variant); display:flex; align-items:center;
          ">
            <span class="material-symbols-rounded" style="font-size:20px;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24">visibility</span>
          </button>
        </div>

        <button class="login-btn" type="submit" id="loginBtn">
          <span class="material-symbols-rounded" style="font-size:18px">login</span>
          Iniciar sesión
        </button>

        <div class="login-error" id="loginError">
          <span class="material-symbols-rounded" style="font-size:18px;flex-shrink:0">error</span>
          <span id="loginErrorMsg">Credenciales inválidas</span>
        </div>
      </form>

      <!-- Back link -->
      <div style="text-align:center;margin-top:24px">
        <a href="index.html" style="
          color:var(--md-on-surface-variant);
          font-size:13px;
          display:inline-flex;align-items:center;gap:4px;
        ">
          <span class="material-symbols-rounded" style="font-size:16px">arrow_back</span>
          Volver al inicio
        </a>
      </div>

    </div><!-- /login-card -->
  </div><!-- /login-panel -->

</div><!-- /login-root -->

<!-- Toast container -->
<div id="toastWrap"></div>

<script src="js/config.js"></script>
<script src="js/api-base.js"></script>
<script src="js/notify.js"></script>
<script>
// Toggle password visibility
document.getElementById('togglePwd').addEventListener('click', function() {
  var input = document.getElementById('password');
  var icon = this.querySelector('.material-symbols-rounded');
  if (input.type === 'password') {
    input.type = 'text';
    icon.textContent = 'visibility_off';
  } else {
    input.type = 'password';
    icon.textContent = 'visibility';
  }
});

// Login form
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var btn = document.getElementById('loginBtn');
  var errBox = document.getElementById('loginError');
  var errMsg = document.getElementById('loginErrorMsg');

  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-rounded" style="font-size:18px;animation:spin .8s linear infinite">progress_activity</span> Ingresando...';
  errBox.classList.remove('show');

  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;
  var apiBase = (window.CEA_API_BASE || window.__API_BASE__ || '').replace(/\/+$/, '');

  fetch(apiBase + '/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: username, password: password })
  })
  .then(function(r) {
    if (!r.ok) return r.json().then(function(d) { throw new Error(d.detail || 'Error ' + r.status); });
    return r.json();
  })
  .then(function(data) {
    if (data.ok) {
      localStorage.setItem('cea_auth', JSON.stringify({ ok: true, at: Date.now() }));
      localStorage.setItem('cea_admin_user', JSON.stringify({ username: data.username, role: data.role }));
      window.location.href = 'admin.html';
    } else {
      throw new Error('Credenciales inválidas');
    }
  })
  .catch(function(err) {
    errMsg.textContent = err.message || 'Error de conexión';
    errBox.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-rounded" style="font-size:18px">login</span> Iniciar sesión';
  });
});

// CSS spinner keyframe
var style = document.createElement('style');
style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(style);
</script>
</body>
</html>
